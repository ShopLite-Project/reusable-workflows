name: Docker Build and Push
description: Build a Docker image and optionally push it to a registry.

inputs:
  image_name:
    description: Full image name, including registry and repository
    required: true
  dockerfile:
    description: Dockerfile path
    required: false
    default: Dockerfile
  context:
    description: Docker build context
    required: false
    default: .
  push:
    description: Push image after build
    required: false
    default: "false"
  tags:
    description: Newline-separated list of tags
    required: true
  registry:
    description: Registry hostname for login
    required: false
    default: ghcr.io
  username:
    description: Registry username
    required: false
    default: ""
  password:
    description: Registry password or token
    required: true

outputs:
  primary_tag:
    description: First generated image tag
    value: ${{ steps.meta.outputs.primary_tag }}

runs:
  using: composite
  steps:
    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to registry
      if: inputs.push == 'true'
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}

    - name: Prepare tags
      id: meta
      shell: bash
      run: |
        set -euo pipefail
        FIRST_TAG="$(printf '%s\n' "${{ inputs.tags }}" | sed '/^\s*$/d' | head -n 1)"
        if [ -z "$FIRST_TAG" ]; then
          echo "At least one tag is required." >&2
          exit 1
        fi
        {
          echo "tags<<EOF"
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "${{ inputs.image_name }}:${tag}"
          done <<< "${{ inputs.tags }}"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"
        echo "primary_tag=${{ inputs.image_name }}:${FIRST_TAG}" >> "$GITHUB_OUTPUT"

    - name: Build and optionally push image
      uses: docker/build-push-action@v6
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        push: ${{ inputs.push == 'true' }}
        tags: ${{ steps.meta.outputs.tags }}
