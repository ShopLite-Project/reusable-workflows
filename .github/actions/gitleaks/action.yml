name: Gitleaks Secret Scan
description: Run Gitleaks against a repository path and upload the SARIF report.

inputs:
  scan_path:
    description: Path to scan for secrets
    required: false
    default: .
  fail_on_leak:
    description: Fail if secrets are detected
    required: false
    default: "true"
  github_token:
    description: Token used by the Gitleaks action
    required: true

runs:
  using: composite
  steps:
    - name: Prepare Gitleaks args
      id: args
      shell: bash
      run: |
        set -euo pipefail
        ARGS="--path=${{ inputs.scan_path }}"
        if [ "${{ inputs.fail_on_leak }}" != "true" ]; then
          ARGS="$ARGS --exit-code=0"
        fi
        echo "value=$ARGS" >> "$GITHUB_OUTPUT"

    - name: Run Gitleaks
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      with:
        args: ${{ steps.args.outputs.value }}

    - name: Upload Gitleaks Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: gitleaks-report
        path: results.sarif
        retention-days: 30
        if-no-files-found: ignore
