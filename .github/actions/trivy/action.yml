name: Trivy Vulnerability Scan
description: Run Trivy filesystem, image, or config scans and upload the SARIF report.

inputs:
  scan_type:
    description: Type of scan
    required: false
    default: fs
  image_ref:
    description: Image reference for image scans
    required: false
    default: ""
  scan_path:
    description: Path to scan for fs or config scans
    required: false
    default: .
  severity:
    description: Severity levels to check
    required: false
    default: CRITICAL,HIGH
  exit_code:
    description: Exit code when vulnerabilities are found
    required: false
    default: "1"

runs:
  using: composite
  steps:
    - name: Run Trivy filesystem scan
      if: inputs.scan_type == 'fs'
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: fs
        scan-ref: ${{ inputs.scan_path }}
        severity: ${{ inputs.severity }}
        exit-code: ${{ inputs.exit_code }}
        format: sarif
        output: trivy-results.sarif

    - name: Run Trivy image scan
      if: inputs.scan_type == 'image'
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: image
        image-ref: ${{ inputs.image_ref }}
        severity: ${{ inputs.severity }}
        exit-code: ${{ inputs.exit_code }}
        format: sarif
        output: trivy-results.sarif

    - name: Run Trivy config scan
      if: inputs.scan_type == 'config'
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: config
        scan-ref: ${{ inputs.scan_path }}
        severity: ${{ inputs.severity }}
        exit-code: ${{ inputs.exit_code }}
        format: sarif
        output: trivy-results.sarif

    - name: Upload Trivy Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: trivy-report-${{ inputs.scan_type }}
        path: trivy-results.sarif
        retention-days: 30
        if-no-files-found: ignore
